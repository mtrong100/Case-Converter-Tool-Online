<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f111a" />
      <stop offset="100%" stop-color="#090a0f" />
    </linearGradient>
    
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="250" fill="url(#bg)" rx="16" />
  <rect x="1" y="1" width="798" height="248" fill="none" stroke="#2d2f42" stroke-width="2" rx="16" />
  
  <!-- Window Controls -->
  <circle cx="30" cy="30" r="7" fill="#ff5f56" />
  <circle cx="55" cy="30" r="7" fill="#ffbd2e" />
  <circle cx="80" cy="30" r="7" fill="#27c93f" />

  <!-- Terminal Path -->
  <text x="400" y="34" font-family="'Courier New', monospace" font-size="14" fill="#6c7086" text-anchor="middle">~/projects/case-converter</text>

  <!-- Logo Icon Background/Glow -->
  <rect x="170" y="70" width="80" height="80" rx="20" fill="#a48cf2" opacity="0.1" filter="url(#glow-purple)" />
  <text x="210" y="125" font-family="Arial, sans-serif" font-size="46" text-anchor="middle" fill="#a48cf2">🔠</text>

  <!-- Title Top -->
  <text x="290" y="110" font-family="'Courier New', monospace" font-weight="900" font-size="54" fill="#b4a1f5" filter="url(#glow-purple)" letter-spacing="4">
    CASE
  </text>
  <text x="290" y="110" font-family="'Courier New', monospace" font-weight="900" font-size="54" fill="#ffffff" letter-spacing="4">
    CASE
  </text>

  <!-- Title Bottom -->
  <text x="290" y="165" font-family="'Courier New', monospace" font-weight="900" font-size="54" fill="#6df0c2" filter="url(#glow-green)" letter-spacing="4">
    CONVERTER
  </text>
  <text x="290" y="165" font-family="'Courier New', monospace" font-weight="900" font-size="54" fill="#ffffff" letter-spacing="4">
    CONVERTER
  </text>

  <!-- Subtitle -->
  <text x="400" y="215" font-family="'Courier New', monospace" font-size="15" fill="#8c8fa1" text-anchor="middle" letter-spacing="1">
    All-in-One Text Case Transformation Tool
  </text>
  
  <rect x="730" y="195" width="12" height="22" fill="#6df0c2">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
